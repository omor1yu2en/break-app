<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>休憩回し</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="footer.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; -webkit-text-size-adjust: 100%; }
    body {
      position: fixed;
      inset: 0;
      background: #ffffff;
      color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(2rem, env(safe-area-inset-top)) max(2rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(2rem, env(safe-area-inset-left));
    }
    #app {
      width: 100%;
      max-width: 760px;
      font-size: clamp(12px, 4.5vw, 28px);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sentence {
      font-size: 1em;
      font-weight: 800;
      line-height: 1.55;
      letter-spacing: -0.01em;
      text-align: right;
      white-space: nowrap;
      width: fit-content;
    }
    .token {
      font-size: 1.75em;
      text-decoration: underline;
      text-decoration-thickness: 3px;
      text-underline-offset: 5px;
      cursor: pointer;
      white-space: nowrap;
      display: inline-block;
      padding: 6px 2px;
    }
    .token:hover { opacity: 0.55; }
    .num { font-size: 1.75em; font-weight: 800; }
    .edit {
      font: inherit;
      font-size: max(16px, 1em);
      font-weight: 800;
      text-align: center;
      border: none;
      border-bottom: 3px solid #000;
      background: transparent;
      color: #000;
      outline: none;
      padding: 0;
      -moz-appearance: textfield;
    }
    .edit::-webkit-outer-spin-button,
    .edit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .edit-time { width: 5.5ch; }
    .page-title {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.05em;
      color: rgba(0, 0, 0, 0.55);
      white-space: nowrap;
      border: 1px solid rgba(0, 0, 0, 0.12);
      padding: 0.3rem 0.9rem;
    }
    .edit-select {
      font: inherit;
      font-size: max(16px, 1em);
      font-weight: 800;
      border: none;
      border-bottom: 3px solid #000;
      background: transparent;
      color: #000;
      outline: none;
      cursor: pointer;
    }
    .slider {
      flex: 1;
      width: 100vw;
      display: flex;
      touch-action: pan-x;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
      user-select: none;
    }
    .slide {
      flex: 0 0 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 max(2rem, env(safe-area-inset-right)) 0 max(2rem, env(safe-area-inset-left));
    }
    .slide--schedule {
      justify-content: flex-start;
      padding-top: 3rem;
      position: relative;
    }
    .slide-message--center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      white-space: nowrap;
    }
    .schedule-scroll {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 2rem;
    }
    .schedule {
      display: grid;
      grid-template-columns: auto auto auto;
      column-gap: 0.6em;
      row-gap: 0.5em;
      align-items: baseline;
      font-size: clamp(10px, 3.2vw, 17px);
    }
    .s-person {
      font-size: 0.85em;
      font-weight: 300;
      color: rgba(0, 0, 0, 0.4);
      text-align: right;
      white-space: nowrap;
    }
    .s-time-cell {
      font-weight: 800;
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-align: right;
    }
    .s-num { font-size: 1.75em; font-variant-numeric: tabular-nums; }
    .s-unit { font-size: 0.75em; font-weight: 300; }
    .s-next { font-size: 0.6em; font-weight: 300; letter-spacing: 0.02em; color: rgba(0, 0, 0, 0.55); }
    .slide-message {
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.05em;
      color: rgba(0, 0, 0, 0.35);
    }
    .page-dots {
      display: flex;
      gap: 7px;
      justify-content: center;
      padding: 0.75rem 0;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.18);
      transition: background 0.25s;
    }
    .dot.active { background: rgba(0, 0, 0, 0.75); }
  </style>
</head>
<body>
  <p class="page-title">休憩回し計算機</p>
  <div class="slider" id="slider">
    <div class="slide">
      <div id="app">
        <div class="sentence">
          <template v-if="editing === 'start'"><input
              ref="startInput"
              class="edit edit-time"
              type="text"
              inputmode="numeric"
              placeholder="HH:MM"
              v-model="startInputValue"
              @blur="commitStart"
              @keydown.enter="commitStart"
            />、</template><template v-else><span class="token" @click="startEdit('start')"><template v-if="startParts">{{ startParts.h }}<span class="caption">時</span><template v-if="startParts.m !== '00'">{{ startParts.m }}<span class="caption">分</span></template><span class="caption">から</span></template><template v-else>今<span class="caption">から</span></template></span>、</template><!--
          --><template v-if="editing === 'total'"><input
              ref="totalInput"
              class="edit edit-num"
              :style="numStyle(total)"
              type="number" min="0" inputmode="numeric"
              v-model="totalInputValue"
              @blur="commitNumber('total')"
              @keydown.enter="commitNumber('total')"
            /></template><template v-else><span class="token" @click="startEdit('total')">{{ total ?? '?' }}</span></template>人を<!--
          --><template v-if="editing === 'per'"><input
              ref="perInput"
              class="edit edit-num"
              :style="numStyle(per)"
              type="number" min="1" inputmode="numeric"
              v-model="perInputValue"
              @blur="commitNumber('per')"
              @keydown.enter="commitNumber('per')"
            /></template><template v-else><span class="token" @click="startEdit('per')">{{ per ?? '?' }}</span></template>人ずつ、<br>
          <template v-if="editing === 'minutes'"><input
              ref="minutesInput"
              class="edit edit-num"
              :style="numStyle(minutes)"
              type="number" min="1" inputmode="numeric"
              v-model="minutesInputValue"
              @blur="commitNumber('minutes')"
              @keydown.enter="commitNumber('minutes')"
            /></template><template v-else><span class="token" @click="startEdit('minutes')">{{ minutes ?? '?' }}</span></template>分休憩を回すと、<br>
          合計<template v-if="allSet"><template v-for="part in totalDurationParts"><span class="num">{{ part.n }}</span><span class="caption">{{ part.label }}</span></template></template><template v-else><span class="num">?</span></template>かかり、<br>
          <template v-if="allSet"><span class="num">{{ endTimeParts.h }}</span><span class="caption">時</span><span class="num">{{ endTimeParts.m }}</span><span class="caption">分</span>に終わります。{{ nextDayLabel }}</template><template v-else><span class="num">?</span><span class="caption">時</span><span class="num">?</span><span class="caption">分</span>に終わります。</template>
        </div>
      </div>
    </div>
    <div class="slide slide--schedule">
      <p v-if="!allSet" class="slide-message slide-message--center">← 左で入力してください</p>
      <p v-else-if="rotations > 15" class="slide-message slide-message--center">ちょっと多いですね。<br>b0nd0は１５組までしか対応できません。</p>
      <div v-else class="schedule-scroll">
        <div class="schedule">
          <template v-for="item in scheduleItems" :key="item.group">
            <span class="s-person">{{ item.group }}組目</span>
            <span class="s-time-cell"><span class="s-num">{{ item.startH }}</span><span class="s-unit">時</span><span class="s-num">{{ item.startM }}</span><span class="s-unit">分</span><span class="s-next" :style="item.startNextDay ? '' : 'visibility:hidden'">（翌日）</span>スタート</span>
            <span class="s-time-cell"><span class="s-num">{{ item.endH }}</span><span class="s-unit">時</span><span class="s-num">{{ item.endM }}</span><span class="s-unit">分</span><span class="s-next" :style="item.endNextDay ? '' : 'visibility:hidden'">（翌日）</span>終了</span>
          </template>
        </div>
      </div>
    </div>
  </div>
  <div class="page-dots" id="pageDots">
    <span class="dot active"></span>
    <span class="dot"></span>
  </div>
  <b0nd0-footer></b0nd0-footer>

  <script>
    const { createApp, ref, computed, nextTick } = Vue;

    createApp({
      setup() {
        const total = ref(null);
        const per = ref(null);
        const minutes = ref(null);
        const startFixed = ref(null);
        const editing = ref(null);
        const startInputValue = ref('');
        const totalInputValue = ref('');
        const perInputValue = ref('');
        const minutesInputValue = ref('');
        const startInput = ref(null);
        const totalInput = ref(null);
        const perInput = ref(null);
        const minutesInput = ref(null);

        const startParts = computed(() => {
          if (startFixed.value === null) return null;
          const [h, m] = startFixed.value.split(':');
          return { h: String(Number(h)), m };
        });

        function startMinutesOfDay() {
          if (startFixed.value === null) {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
          }
          const [h, m] = startFixed.value.split(':').map(Number);
          return h * 60 + m;
        }

        const allSet = computed(() => total.value !== null && per.value !== null && minutes.value !== null);

        const rotations = computed(() => {
          const t = Number(total.value);
          const p = Number(per.value);
          if (p <= 0) return 0;
          return Math.ceil(t / p);
        });

        const totalDuration = computed(() => Number(minutes.value) * rotations.value);

        const endTotalMinutes = computed(() => startMinutesOfDay() + totalDuration.value);

        const totalDurationParts = computed(() => {
          const mins = totalDuration.value;
          const h = Math.floor(mins / 60);
          const m = mins % 60;
          if (mins === 0) return [{ n: '0', label: '分' }];
          if (m === 0) return [{ n: String(h), label: '時間' }];
          if (h === 0) return [{ n: String(m), label: '分' }];
          return [{ n: String(h), label: '時間' }, { n: String(m), label: '分' }];
        });

        const endTimeParts = computed(() => {
          const tm = endTotalMinutes.value;
          const h = Math.floor(tm / 60) % 24;
          const m = tm % 60;
          return { h: String(h), m: String(m).padStart(2, '0') };
        });

        const nextDayLabel = computed(() => {
          const days = Math.floor(endTotalMinutes.value / (60 * 24));
          if (days === 1) return '（翌日）';
          if (days > 1) return `（${days}日後）`;
          return '';
        });

        function toFW(n) {
          return String(n).split('').map(function (d) { return '０１２３４５６７８９'[+d]; }).join('');
        }

        const scheduleItems = computed(() => {
          if (!allSet.value || rotations.value > 15) return [];
          const r = rotations.value;
          const m = Number(minutes.value);
          const base = startMinutesOfDay();
          const items = [];
          for (let i = 0; i < r; i++) {
            const sm = base + i * m;
            const em = sm + m;
            items.push({
              group: toFW(i + 1),
              startH: String(Math.floor(sm / 60) % 24).padStart(2, '0'),
              startM: String(sm % 60).padStart(2, '0'),
              startNextDay: sm >= 1440,
              endH: String(Math.floor(em / 60) % 24).padStart(2, '0'),
              endM: String(em % 60).padStart(2, '0'),
              endNextDay: em >= 1440,
            });
          }
          return items;
        });

        function numStyle(val) {
          const len = String(val).length;
          return { width: `${Math.max(len + 1, 2)}ch` };
        }

        function startEdit(field) {
          editing.value = field;
          if (field === 'start') {
            startInputValue.value = startFixed.value
              ? `${Number(startFixed.value.split(':')[0])}:${startFixed.value.split(':')[1]}`
              : '';
          } else if (field === 'total') {
            totalInputValue.value = total.value;
          } else if (field === 'per') {
            perInputValue.value = per.value;
          } else if (field === 'minutes') {
            minutesInputValue.value = minutes.value;
          }
          nextTick(() => {
            const map = { start: startInput, total: totalInput, per: perInput, minutes: minutesInput };
            const el = map[field]?.value;
            if (el) { el.focus(); if (el.select) el.select(); }
          });
        }

        function commitStart() {
          const v = startInputValue.value.trim();
          if (!v) {
            startFixed.value = null;
          } else {
            let h, m;
            if (v.includes(':')) {
              [h, m] = v.split(':').map(Number);
            } else if (v.length <= 2) {
              h = Number(v); m = 0;
            } else {
              h = Number(v.slice(0, -2)); m = Number(v.slice(-2));
            }
            if (!isNaN(h) && !isNaN(m) && h >= 0 && h <= 23 && m >= 0 && m <= 59) {
              startFixed.value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            } else {
              startFixed.value = null;
            }
          }
          editing.value = null;
        }

        function commitNumber(field) {
          const raw = { total: totalInputValue, per: perInputValue, minutes: minutesInputValue }[field].value;
          let n = parseInt(raw, 10);
          if (isNaN(n)) {
            ({ total, per, minutes }[field]).value = null;
          } else {
            if (field === 'total') n = Math.max(0, n);
            else n = Math.max(1, n);
            ({ total, per, minutes }[field]).value = n;
          }
          editing.value = null;
        }

        return {
          total, per, minutes, startFixed,
          editing, allSet,
          startInputValue, totalInputValue, perInputValue, minutesInputValue,
          startInput, totalInput, perInput, minutesInput,
          startParts, rotations, totalDurationParts, endTimeParts, nextDayLabel,
          scheduleItems,
          numStyle, startEdit, commitStart, commitNumber,
        };
      }
    }).mount('#slider');

    (function () {
      var slider = document.getElementById('slider');
      var dots   = document.querySelectorAll('.dot');
      var current = 0, startX = 0, dragging = false;

      function goTo(page) {
        current = page;
        slider.style.transform = 'translateX(-' + (page * 100) + '%)';
        dots.forEach(function (d, i) { d.classList.toggle('active', i === page); });
      }

      document.addEventListener('touchstart', function (e) { startX = e.touches[0].clientX; }, { passive: true });
      document.addEventListener('touchend', function (e) {
        var dx = e.changedTouches[0].clientX - startX;
        if (dx < -40 && current < 1) goTo(1);
        else if (dx > 40 && current > 0) goTo(0);
      }, { passive: true });

      document.addEventListener('mousedown', function (e) { startX = e.clientX; dragging = true; });
      document.addEventListener('mouseup', function (e) {
        if (!dragging) return; dragging = false;
        var dx = e.clientX - startX;
        if (dx < -40 && current < 1) goTo(1);
        else if (dx > 40 && current > 0) goTo(0);
      });
      document.addEventListener('mouseleave', function () { dragging = false; });
    })();
  </script>
</body>
</html>
