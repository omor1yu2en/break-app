<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>休憩回し</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="footer.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; -webkit-text-size-adjust: 100%; }
    body {
      background: #ffffff;
      color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem;
      padding: max(2rem, env(safe-area-inset-top)) max(2rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(2rem, env(safe-area-inset-left));
    }
    #app {
      width: 100%;
      max-width: 760px;
      font-size: clamp(12px, 4.5vw, 28px);
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sentence {
      font-size: 1em;
      font-weight: 800;
      line-height: 1.55;
      letter-spacing: -0.01em;
      text-align: right;
      white-space: nowrap;
      width: fit-content;
    }
    .token {
      font-size: 1.75em;
      text-decoration: underline;
      text-decoration-thickness: 3px;
      text-underline-offset: 5px;
      cursor: pointer;
      white-space: nowrap;
      display: inline-block;
      padding: 6px 2px;
    }
    .token:hover { opacity: 0.55; }
    .num { font-size: 1.75em; font-weight: 800; }
    .caption { font-size: 1em; }
    .edit {
      font: inherit;
      font-size: max(16px, 1em);
      font-weight: 800;
      text-align: center;
      border: none;
      border-bottom: 3px solid #000;
      background: transparent;
      color: #000;
      outline: none;
      padding: 0;
      -moz-appearance: textfield;
    }
    .edit::-webkit-outer-spin-button,
    .edit::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .edit-time { width: 5.5ch; }
    .edit-num { }
    .page-title {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.05em;
      color: rgba(0, 0, 0, 0.55);
      white-space: nowrap;
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 0;
      padding: 0.3rem 0.9rem;
    }
    .edit-select {
      font: inherit;
      font-size: max(16px, 1em);
      font-weight: 800;
      border: none;
      border-bottom: 3px solid #000;
      background: transparent;
      color: #000;
      outline: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <p class="page-title">休憩回し計算機</p>
  <div id="app">
    <div class="sentence">
      <!-- 今から / 時刻 -->
      <template v-if="editing === 'start'"><input
          ref="startInput"
          class="edit edit-time"
          type="text"
          inputmode="numeric"
          placeholder="HH:MM"
          v-model="startInputValue"
          @blur="commitStart"
          @keydown.enter="commitStart"
        />、</template><template v-else><span class="token" @click="startEdit('start')"><template v-if="startParts">{{ startParts.h }}<span class="caption">時</span><template v-if="startParts.m !== '00'">{{ startParts.m }}<span class="caption">分</span></template><span class="caption">から</span></template><template v-else>今<span class="caption">から</span></template></span>、</template><!--
      --><template v-if="editing === 'total'"><input
          ref="totalInput"
          class="edit edit-num"
          :style="numStyle(total)"
          type="number" min="0" inputmode="numeric"
          v-model="totalInputValue"
          @blur="commitNumber('total')"
          @keydown.enter="commitNumber('total')"
        /></template><template v-else><span class="token" @click="startEdit('total')">{{ total ?? '?' }}</span></template>人を<!--
      --><template v-if="editing === 'per'"><input
          ref="perInput"
          class="edit edit-num"
          :style="numStyle(per)"
          type="number" min="1" inputmode="numeric"
          v-model="perInputValue"
          @blur="commitNumber('per')"
          @keydown.enter="commitNumber('per')"
        /></template><template v-else><span class="token" @click="startEdit('per')">{{ per ?? '?' }}</span></template>人ずつ、<br>
      <!-- 分数 -->
      <template v-if="editing === 'minutes'"><input
          ref="minutesInput"
          class="edit edit-num"
          :style="numStyle(minutes)"
          type="number" min="1" inputmode="numeric"
          v-model="minutesInputValue"
          @blur="commitNumber('minutes')"
          @keydown.enter="commitNumber('minutes')"
        /></template><template v-else><span class="token" @click="startEdit('minutes')">{{ minutes ?? '?' }}</span></template>分休憩を回すと、<br>
      合計<template v-if="allSet"><template v-for="part in totalDurationParts"><span class="num">{{ part.n }}</span><span class="caption">{{ part.label }}</span></template></template><template v-else><span class="num">?</span></template>かかり、<br>
      <template v-if="allSet"><span class="num">{{ endTimeParts.h }}</span><span class="caption">時</span><span class="num">{{ endTimeParts.m }}</span><span class="caption">分</span>に終わります。{{ nextDayLabel }}</template><template v-else><span class="num">?</span><span class="caption">時</span><span class="num">?</span><span class="caption">分</span>に終わります。</template>
    </div>
  </div>
  <b0nd0-footer></b0nd0-footer>

  <script>
    const { createApp, ref, computed, nextTick } = Vue;

    createApp({
      setup() {
        const total = ref(null);
        const per = ref(null);
        const minutes = ref(null);

        // 開始時刻: null = 「今から」（現在時刻）。文字列 "HH:mm" = 固定時刻。
        const startFixed = ref(null);

        const editing = ref(null);
        const startInputValue = ref('');
        const totalInputValue = ref('');
        const perInputValue = ref('');
        const minutesInputValue = ref('');

        const startInput = ref(null);
        const totalInput = ref(null);
        const perInput = ref(null);
        const minutesInput = ref(null);

        const startLabel = computed(() => {
          if (startFixed.value === null) return '今から';
          const [h, m] = startFixed.value.split(':');
          return `${Number(h)}時${m}分から`;
        });

        const startParts = computed(() => {
          if (startFixed.value === null) return null;
          const [h, m] = startFixed.value.split(':');
          return { h: String(Number(h)), m };
        });

        // 開始時刻を「0時からの分」で返す
        function startMinutesOfDay() {
          if (startFixed.value === null) {
            const now = new Date();
            return now.getHours() * 60 + now.getMinutes();
          }
          const [h, m] = startFixed.value.split(':').map(Number);
          return h * 60 + m;
        }

        const allSet = computed(() => total.value !== null && per.value !== null && minutes.value !== null);

        const rotations = computed(() => {
          const t = Number(total.value);
          const p = Number(per.value);
          if (p <= 0) return 0;
          return Math.ceil(t / p);
        });

        const totalDuration = computed(() => Number(minutes.value) * rotations.value);

        const totalDurationLabel = computed(() => {
          const mins = totalDuration.value;
          const h = Math.floor(mins / 60);
          const m = mins % 60;
          if (mins === 0) return '0分';
          if (m === 0) return `${h}時間`;
          if (h === 0) return `${m}分`;
          return `${h}時間${m}分`;
        });

        const endTotalMinutes = computed(() => startMinutesOfDay() + totalDuration.value);

        const totalDurationParts = computed(() => {
          const mins = totalDuration.value;
          const h = Math.floor(mins / 60);
          const m = mins % 60;
          if (mins === 0) return [{ n: '0', label: '分' }];
          if (m === 0) return [{ n: String(h), label: '時間' }];
          if (h === 0) return [{ n: String(m), label: '分' }];
          return [{ n: String(h), label: '時間' }, { n: String(m), label: '分' }];
        });

        const endTimeParts = computed(() => {
          const tm = endTotalMinutes.value;
          const h = Math.floor(tm / 60) % 24;
          const m = tm % 60;
          return { h: String(h), m: String(m).padStart(2, '0') };
        });

        const endTimeLabel = computed(() => {
          const tm = endTotalMinutes.value;
          const h = Math.floor(tm / 60) % 24;
          const m = tm % 60;
          return `${h}時${String(m).padStart(2, '0')}分`;
        });

        const nextDayLabel = computed(() => {
          const days = Math.floor(endTotalMinutes.value / (60 * 24));
          if (days === 1) return '（翌日）';
          if (days > 1) return `（${days}日後）`;
          return '';
        });

        function numStyle(val) {
          const len = String(val).length;
          return { width: `${Math.max(len + 1, 2)}ch` };
        }

        function startEdit(field) {
          editing.value = field;
          if (field === 'start') {
            startInputValue.value = startFixed.value
              ? `${Number(startFixed.value.split(':')[0])}:${startFixed.value.split(':')[1]}`
              : '';
          } else if (field === 'total') {
            totalInputValue.value = total.value;
          } else if (field === 'per') {
            perInputValue.value = per.value;
          } else if (field === 'minutes') {
            minutesInputValue.value = minutes.value;
          }
          nextTick(() => {
            const map = { start: startInput, total: totalInput, per: perInput, minutes: minutesInput };
            const el = map[field]?.value;
            if (el) { el.focus(); if (el.select) el.select(); }
          });
        }

        function commitStart() {
          const v = startInputValue.value.trim();
          if (!v) {
            startFixed.value = null;
          } else {
            let h, m;
            if (v.includes(':')) {
              [h, m] = v.split(':').map(Number);
            } else if (v.length <= 2) {
              h = Number(v); m = 0;
            } else {
              h = Number(v.slice(0, -2)); m = Number(v.slice(-2));
            }
            if (!isNaN(h) && !isNaN(m) && h >= 0 && h <= 23 && m >= 0 && m <= 59) {
              startFixed.value = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            } else {
              startFixed.value = null;
            }
          }
          editing.value = null;
        }

        function commitNumber(field) {
          const raw = { total: totalInputValue, per: perInputValue, minutes: minutesInputValue }[field].value;
          let n = parseInt(raw, 10);
          if (isNaN(n)) {
            ({ total, per, minutes }[field]).value = null;
          } else {
            if (field === 'total') n = Math.max(0, n);
            else n = Math.max(1, n);
            ({ total, per, minutes }[field]).value = n;
          }
          editing.value = null;
        }

        return {
          total, per, minutes, startFixed,
          editing, allSet,
          startInputValue, totalInputValue, perInputValue, minutesInputValue,
          startInput, totalInput, perInput, minutesInput,
          startLabel, startParts, rotations, totalDuration, totalDurationLabel,
          totalDurationParts, endTimeParts,
          endTimeLabel, nextDayLabel,
          numStyle, startEdit, commitStart, commitNumber,
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
